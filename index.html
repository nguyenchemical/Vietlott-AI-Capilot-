<!DOCTYPE html>
<html lang="vi" x-data="app()" :class="{ 'dark': darkMode }">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vietlott AI Predictor Pro Max</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.0/umd/lucide.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        [x-cloak] { display: none !important; }
        .ball {
            display: inline-flex; align-items: center; justify-content: center;
            width: 38px; height: 38px; border-radius: 50%; font-weight: bold;
            color: white; margin: 3px; box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            font-size: 0.9rem; transition: all 0.3s ease;
        }
        .mega-ball { background: radial-gradient(circle at 30% 30%, #ff4d4d, #b30000); }
        .power-ball { background: radial-gradient(circle at 30% 30%, #ffd700, #b8860b); color: #000; }
        .keno-ball { background: radial-gradient(circle at 30% 30%, #4facfe, #00f2fe); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .tab-active { color: #dc2626 !important; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 transition-colors duration-300 font-sans">

    <header class="sticky top-0 z-50 bg-white/80 dark:bg-gray-800/80 backdrop-blur-md border-b border-gray-200 dark:border-gray-700">
        <div class="max-w-md mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="p-2 bg-red-600 rounded-lg shadow-lg shadow-red-500/40">
                    <i data-lucide="cpu" class="text-white w-6 h-6"></i>
                </div>
                <h1 class="font-black text-xl tracking-tighter italic">VIETLOTT <span class="text-red-600">AI</span></h1>
            </div>
            <button @click="toggleDarkMode()" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700 transition-transform active:scale-90">
                <i :data-lucide="darkMode ? 'sun' : 'moon'" class="w-6 h-6 text-orange-500"></i>
            </button>
        </div>
    </header>

    <main class="max-w-md mx-auto pb-24 min-h-screen">
        <div x-show="activeTab === 'home'" x-cloak class="animate-in fade-in duration-500">
            <div class="flex overflow-x-auto py-4 px-4 gap-3 no-scrollbar">
                <template x-for="game in games" :key="game.id">
                    <button 
                        @click="activeGame = game.id; currentPrediction = []"
                        :class="activeGame === game.id ? 'bg-red-600 text-white scale-105 shadow-md' : 'bg-white dark:bg-gray-800 text-gray-500'"
                        class="whitespace-nowrap px-5 py-2 rounded-2xl font-bold transition-all text-sm border border-transparent dark:border-gray-700"
                        x-text="game.name">
                    </button>
                </template>
            </div>

            <div class="px-4 mt-2">
                <div class="bg-white dark:bg-gray-800 rounded-[2.5rem] p-6 shadow-2xl border border-gray-100 dark:border-gray-700 relative overflow-hidden">
                    <div class="absolute -top-10 -right-10 opacity-[0.03] dark:opacity-[0.05]">
                        <i data-lucide="brain-circuit" class="w-40 h-40"></i>
                    </div>
                    
                    <div class="flex justify-between items-start mb-6">
                        <div>
                            <h2 class="text-xs font-bold text-red-500 uppercase tracking-widest mb-1">Deep Learning Analysis</h2>
                            <p class="text-xl font-black" x-text="getCurrentGame().name"></p>
                        </div>
                        <div class="bg-green-100 dark:bg-green-900/30 px-3 py-1 rounded-full flex items-center gap-1">
                            <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                            <span class="text-[10px] font-bold text-green-600 dark:text-green-400">REAL-TIME</span>
                        </div>
                    </div>

                    <div class="bg-gray-50 dark:bg-gray-900/50 rounded-3xl p-4 min-h-[140px] flex items-center justify-center mb-6 border border-dashed border-gray-300 dark:border-gray-600">
                        <template x-if="loading">
                            <div class="flex flex-col items-center gap-3">
                                <div class="flex space-x-2">
                                    <div class="w-3 h-3 bg-red-600 rounded-full animate-bounce"></div>
                                    <div class="w-3 h-3 bg-red-600 rounded-full animate-bounce [animation-delay:-0.3s]"></div>
                                    <div class="w-3 h-3 bg-red-600 rounded-full animate-bounce [animation-delay:-0.5s]"></div>
                                </div>
                                <span class="text-[10px] font-medium animate-pulse">ĐANG PHÂN TÍCH DỮ LIỆU...</span>
                            </div>
                        </template>
                        
                        <template x-if="!loading && currentPrediction.length > 0">
                            <div class="flex flex-wrap justify-center gap-1">
                                <template x-for="num in currentPrediction" :key="Math.random()">
                                    <span :class="getBallClass()" class="ball" x-text="num"></span>
                                </template>
                            </div>
                        </template>

                        <template x-if="!loading && currentPrediction.length === 0">
                            <div class="text-gray-400 text-sm italic text-center">Nhấn nút bên dưới để AI quét dãy số may mắn</div>
                        </template>
                    </div>

                    <button @click="analyzeAI()" class="w-full bg-gradient-to-br from-red-600 to-red-800 text-white py-5 rounded-2xl font-black text-lg shadow-xl shadow-red-500/40 active:scale-95 transition-all flex items-center justify-center gap-3">
                        <i data-lucide="sparkles" class="w-5 h-5"></i>
                        PHÂN TÍCH AI
                    </button>
                </div>
            </div>

            <div class="px-4 mt-6">
                <div class="bg-gradient-to-tr from-indigo-700 to-purple-600 rounded-[2rem] p-6 text-white shadow-xl relative overflow-hidden">
                    <h3 class="font-bold flex items-center gap-2 mb-4 relative z-10">
                        <i data-lucide="star" class="w-5 h-5 fill-yellow-400 text-yellow-400"></i> Dự đoán theo Ngày sinh
                    </h3>
                    <div class="grid grid-cols-3 gap-3 relative z-10">
                        <select x-model="dob.day" class="bg-white/10 backdrop-blur-md border border-white/20 rounded-xl px-2 py-3 outline-none focus:bg-white/20">
                            <template x-for="d in 31" :key="d"><option :value="d" x-text="d" class="text-black"></option></template>
                        </select>
                        <select x-model="dob.month" class="bg-white/10 backdrop-blur-md border border-white/20 rounded-xl px-2 py-3 outline-none focus:bg-white/20">
                            <template x-for="m in 12" :key="m"><option :value="m" x-text="'Tháng '+m" class="text-black"></option></template>
                        </select>
                        <select x-model="dob.year" class="bg-white/10 backdrop-blur-md border border-white/20 rounded-xl px-2 py-3 outline-none focus:bg-white/20">
                            <template x-for="y in Array.from({length: (new Date().getFullYear() - 1970 + 1)}, (_, i) => 1970 + i).reverse()" :key="y">
                                <option :value="y" x-text="y" class="text-black"></option>
                            </template>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <div x-show="activeTab !== 'home'" x-cloak class="p-10 text-center animate-in slide-in-from-bottom-10">
            <div class="bg-white dark:bg-gray-800 rounded-3xl p-8 shadow-lg">
                <i data-lucide="construction" class="w-16 h-16 mx-auto mb-4 text-yellow-500"></i>
                <h2 class="text-xl font-bold mb-2">Tính năng đang phát triển</h2>
                <p class="text-sm text-gray-500">Tính năng <span class="font-bold text-red-500" x-text="activeTab.toUpperCase()"></span> sẽ sớm ra mắt trong bản cập nhật tới!</p>
                <button @click="activeTab = 'home'" class="mt-6 text-red-600 font-bold underline">Quay lại Trang chủ</button>
            </div>
        </div>

    </main>

    <nav class="fixed bottom-0 w-full max-w-md left-1/2 -translate-x-1/2 bg-white/90 dark:bg-gray-800/90 backdrop-blur-lg border-t border-gray-200 dark:border-gray-700 px-6 py-3 flex justify-between items-center rounded-t-[2.5rem] shadow-[0_-10px_30px_rgba(0,0,0,0.1)] z-50">
        <button @click="activeTab = 'home'" :class="activeTab === 'home' && 'tab-active'" class="flex flex-col items-center text-gray-400 transition-colors">
            <i data-lucide="home" class="w-6 h-6"></i>
            <span class="text-[10px] mt-1 font-bold">Trang chủ</span>
        </button>
        <button @click="activeTab = 'history'" :class="activeTab === 'history' && 'tab-active'" class="flex flex-col items-center text-gray-400 transition-colors">
            <i data-lucide="history" class="w-6 h-6"></i>
            <span class="text-[10px] mt-1 font-bold">Lịch sử</span>
        </button>
        <button @click="activeTab = 'stats'" :class="activeTab === 'stats' && 'tab-active'" class="flex flex-col items-center text-gray-400 transition-colors">
            <i data-lucide="trending-up" class="w-6 h-6"></i>
            <span class="text-[10px] mt-1 font-bold">Thống kê</span>
        </button>
        <button @click="activeTab = 'profile'" :class="activeTab === 'profile' && 'tab-active'" class="flex flex-col items-center text-gray-400 transition-colors">
            <i data-lucide="user" class="w-6 h-6"></i>
            <span class="text-[10px] mt-1 font-bold">Cá nhân</span>
        </button>
    </nav>

    <script>
        function app() {
            return {
                darkMode: true,
                activeTab: 'home',
                activeGame: 'mega645',
                loading: false,
                currentPrediction: [],
                dob: { day: 1, month: 1, year: 2000 },
                
                // Âm thanh
                audio: {
                    click: new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3'),
                    success: new Audio('https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3')
                },

                games: [
                    { id: 'mega645', name: 'Mega 6/45', max: 45, count: 6 },
                    { id: 'power655', name: 'Power 6/55', max: 55, count: 7 },
                    { id: 'keno', name: 'Keno', max: 80, count: 10 },
                    { id: 'max3d', name: 'Max 3D', max: 999, count: 2 },
                    { id: 'max3dp', name: 'Max 3D+', max: 999, count: 2 },
                    { id: 'max3dpro', name: 'Max 3D Pro', max: 999, count: 3 },
                    { id: 'bingo18', name: 'Bingo 18', max: 6, count: 3 },
                    { id: 'lotto535', name: 'Lotto 5/35', max: 35, count: 5 }
                ],

                init() {
                    lucide.createIcons();
                    // Tiền xử lý âm thanh
                    Object.values(this.audio).forEach(a => { a.volume = 0.4; a.load(); });
                },

                toggleDarkMode() {
                    this.darkMode = !this.darkMode;
                    this.$nextTick(() => lucide.createIcons());
                },

                getCurrentGame() {
                    return this.games.find(g => g.id === this.activeGame);
                },

                getBallClass() {
                    if(this.activeGame.includes('power')) return 'power-ball';
                    if(this.activeGame.includes('mega')) return 'mega-ball';
                    return 'keno-ball';
                },

                // Thuật toán AI tối ưu
                analyzeAI() {
                    this.audio.click.play();
                    this.loading = true;
                    this.currentPrediction = [];

                    const game = this.getCurrentGame();
                    
                    // Giả lập thời gian Deep Learning phân tích
                    setTimeout(() => {
                        let results = [];
                        
                        if(game.id.includes('max3d')) {
                            // Thuật toán cho dòng Max 3D (3 chữ số)
                            for(let i=0; i<game.count; i++) {
                                results.push(Math.floor(Math.random() * 1000).toString().padStart(3, '0'));
                            }
                        } else {
                            // Thuật toán Trọng số cho dãy số (Mega, Power, Keno)
                            let pool = [];
                            // Tạo "Trọng số ảo" dựa trên xác suất Monte Carlo
                            for(let i=1; i<=game.max; i++) {
                                let weight = Math.floor(Math.random() * 10) + 1; // AI gán trọng số ngẫu nhiên cho mỗi số
                                for(let j=0; j<weight; j++) pool.push(i);
                            }
                            
                            let selected = new Set();
                            while(selected.size < game.count) {
                                let pick = pool[Math.floor(Math.random() * pool.length)];
                                selected.add(pick < 10 ? '0' + pick : pick.toString());
                            }
                            results = Array.from(selected).sort((a,b) => a-b);
                        }

                        this.currentPrediction = results;
                        this.loading = false;
                        
                        // Hiệu ứng hoàn tất
                        this.audio.success.play();
                        this.triggerFireworks();
                        this.$nextTick(() => lucide.createIcons());
                    }, 2000);
                },

                triggerFireworks() {
                    const duration = 3 * 1000;
                    const end = Date.now() + duration;

                    (function frame() {
                        confetti({
                            particleCount: 3,
                            angle: 60,
                            spread: 55,
                            origin: { x: 0 },
                            colors: ['#ff0000', '#ffd700']
                        });
                        confetti({
                            particleCount: 3,
                            angle: 120,
                            spread: 55,
                            origin: { x: 1 },
                            colors: ['#ff0000', '#ffd700']
                        });

                        if (Date.now() < end) {
                            requestAnimationFrame(frame);
                        }
                    }());
                }
            }
        }
    </script>
</body>
</html>
