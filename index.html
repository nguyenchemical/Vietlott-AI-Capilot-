<!DOCTYPE html>
<html lang="vi" x-data="app()" :class="{ 'dark': darkMode }">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vietlott AI Pro - Hybrid UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.0/umd/lucide.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        [x-cloak] { display: none !important; }
        html, body { height: 100%; overflow: hidden; position: fixed; width: 100%; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        body { padding-top: env(safe-area-inset-top); display: flex; flex-direction: column; background: #0f172a; color: #f8fafc; }
        main { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: 100px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }

        /* Ball UI */
        .ball {
            display: inline-flex; align-items: center; justify-content: center;
            width: 36px; height: 36px; border-radius: 50%; font-weight: 800;
            color: white; margin: 3px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); font-size: 14px;
        }
        .mega-ball { background: radial-gradient(circle at 30% 30%, #ff4d4d, #b30000); }
        .power-ball { background: radial-gradient(circle at 30% 30%, #ffd700, #b8860b); color: #000; }
        .special-ball { background: radial-gradient(circle at 30% 30%, #4facfe, #00f2fe); }

        /* Jackpot Card Mini (Gọn lại theo yêu cầu) */
        .jackpot-card {
            background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 12px 16px; border-radius: 24px;
        }
        .text-gold {
            background: linear-gradient(to bottom, #fff5b1, #ffd700, #ff9500);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-weight: 900;
        }

        /* LED Status */
        .led-indicator {
            width: 8px; height: 8px; border-radius: 50%;
            display: inline-block; margin-right: 6px;
        }
        .led-online { background-color: #22c55e; box-shadow: 0 0 8px #22c55e; animation: blink 1s infinite; }
        .led-offline { background-color: #ef4444; box-shadow: 0 0 8px #ef4444; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* UI Cũ: Nút bấm và Form */
        .btn-predict { background: linear-gradient(to right, #f97316, #ea580c); }
        .btn-jackpot { background: linear-gradient(to right, #eab308, #ca8a04); }
        .birthday-box { background: #4f46e5; border-radius: 24px; }
    </style>
</head>
<body x-init="startApp()">

    <header class="flex-none px-4 h-14 flex items-center justify-between border-b border-white/5 bg-slate-900/50">
        <div class="flex items-center gap-2">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR_X3GvC7QxX0YQ_4k9-1W1K7A1-P7y-5-5-A&s" class="w-7 h-7 rounded" alt="Logo">
            <h1 class="font-black text-lg">VIETLOTT <span class="text-red-500">AI</span></h1>
        </div>
        <div class="flex items-center text-[10px] font-bold text-white/50 uppercase">
            <span :class="isOnline ? 'led-online' : 'led-offline'" class="led-indicator"></span>
            <span x-text="isOnline ? 'Online' : 'Offline'"></span>
        </div>
    </header>

    <main class="no-scrollbar">
        <div class="flex overflow-x-auto p-4 gap-2 no-scrollbar">
            <template x-for="game in games" :key="game.id">
                <button @click="selectGame(game.id)" 
                    :class="activeGame === game.id ? 'bg-red-600 text-white' : 'bg-slate-800 text-white/60'"
                    class="whitespace-nowrap px-5 py-2 rounded-full text-[11px] font-black uppercase transition-all" 
                    x-text="game.name"></button>
            </template>
        </div>

        <div class="px-4 mb-3">
            <div class="jackpot-card shadow-2xl">
                <div class="flex justify-between items-start mb-1">
                    <div class="text-[10px] font-black uppercase text-white/40 tracking-widest">Jackpot <span x-text="getCurrentGame().name"></span></div>
                    <div class="text-[10px] text-red-500 font-black" x-text="jackpotProbability + '% 🚨'"></div>
                </div>
                <div class="text-2xl text-gold mb-1" x-text="formattedJackpot"></div>
                <div class="text-[9px] text-white/30 font-mono mb-3" x-text="'Kỳ #' + currentKy + ' • ' + currentDayStr"></div>
                
                <div class="w-full h-1 bg-white/10 rounded-full overflow-hidden mb-3">
                    <div class="h-full bg-gradient-to-r from-green-500 via-yellow-500 to-red-600 transition-all duration-1000" :style="'width: ' + jackpotProbability + '%'"></div>
                </div>

                <div class="flex gap-1">
                    <template x-for="day in ['T2','T3','T4','T5','T6','T7','CN']">
                        <div :class="isGameDay(day) ? 'bg-red-600 text-white font-bold' : 'text-white/20'"
                             class="flex-1 text-[8px] py-1 rounded-md text-center" x-text="day"></div>
                    </template>
                </div>
            </div>
        </div>

        <div class="px-4 mb-3">
            <div class="bg-slate-800/40 rounded-[2rem] p-5 border border-white/5 relative">
                <div class="text-center mb-4">
                    <span class="text-xs font-black uppercase text-white/40">Dự đoán AI: <span class="text-red-500" x-text="getCurrentGame().name"></span></span>
                </div>

                <div class="flex flex-wrap justify-center min-h-[60px] items-center mb-6">
                    <template x-if="loading">
                        <div class="flex gap-1 animate-pulse"><div class="w-2 h-2 bg-red-500 rounded-full"></div><div class="w-2 h-2 bg-red-500 rounded-full"></div></div>
                    </template>
                    <template x-if="!loading && currentPrediction.length > 0">
                        <div class="flex flex-wrap justify-center animate-in zoom-in">
                            <template x-for="(num, index) in currentPrediction" :key="index">
                                <span :class="getBallClass(index)" class="ball" x-text="num"></span>
                            </template>
                        </div>
                    </template>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <button @click="generatePrediction(false)" class="btn-predict h-12 rounded-2xl font-black uppercase text-[10px]">Phân Tích AI</button>
                    <button @click="generatePrediction(true)" class="btn-jackpot h-12 rounded-2xl font-black uppercase text-[10px]">Soi Jackpot</button>
                </div>
            </div>
        </div>

        <div class="px-4">
            <div class="birthday-box p-5 shadow-lg">
                <h3 class="text-[11px] font-black uppercase mb-3 flex items-center gap-2">Vận mệnh ngày sinh</h3>
                <div class="grid grid-cols-3 gap-2 mb-3">
                    <select class="bg-white/10 border border-white/20 rounded-xl p-2 text-xs outline-none"><template x-for="d in 31"><option :value="d" x-text="d"></option></template></select>
                    <select class="bg-white/10 border border-white/20 rounded-xl p-2 text-xs outline-none"><template x-for="m in 12"><option :value="m" x-text="'Tháng '+m"></option></template></select>
                    <select class="bg-white/10 border border-white/20 rounded-xl p-2 text-xs outline-none"><option value="2026">2026</option></select>
                </div>
                <button @click="generatePrediction(false, true)" class="w-full bg-white text-indigo-700 py-3 rounded-xl font-black text-[10px] uppercase shadow-md active:scale-95 transition-all">Tạo số may mắn</button>
            </div>
        </div>

        <div class="px-4 mt-4 text-center">
            <div class="inline-flex items-center gap-2 bg-slate-800/80 px-4 py-2 rounded-full border border-white/5">
                <span :class="isOnline ? 'led-online' : 'led-offline'" class="led-indicator"></span>
                <span class="text-[9px] font-bold text-white/40 uppercase tracking-tighter">
                    Dữ liệu: <span x-text="isOnline ? 'Real-time kết nối Vietlott' : 'Mất kết nối'"></span>
                </span>
            </div>
        </div>
    </main>

    <nav class="flex-none bg-slate-900 border-t border-white/5 px-6 py-4 pb-8 flex justify-between items-center">
        <div class="text-red-500 flex flex-col items-center gap-1"><i data-lucide="home" class="w-5 h-5"></i><span class="text-[8px] font-black uppercase">Trang chủ</span></div>
        <div class="text-white/30 flex flex-col items-center gap-1"><i data-lucide="history" class="w-5 h-5"></i><span class="text-[8px] font-black uppercase">Lịch sử</span></div>
        <div class="text-white/30 flex flex-col items-center gap-1"><i data-lucide="bar-chart-2" class="w-5 h-5"></i><span class="text-[8px] font-black uppercase">Thống kê</span></div>
        <div class="text-white/30 flex flex-col items-center gap-1"><i data-lucide="user" class="w-5 h-5"></i><span class="text-[8px] font-black uppercase">Cá nhân</span></div>
    </nav>

    <script>
        function app() {
            return {
                darkMode: true, activeGame: 'mega645', loading: false, isOnline: true,
                currentPrediction: [], jackpotProbability: 46,
                formattedJackpot: '27.617 Tỷ Đ', currentKy: '01486',
                currentDayStr: 'Thứ 6, 20/03/2026',

                games: [
                    { id: 'mega645', name: 'Mega 6/45', schedule: ['T4','T6','CN'], max: 45, count: 6 },
                    { id: 'power655', name: 'Power 6/55', schedule: ['T3','T5','T7'], max: 55, count: 7 },
                    { id: 'max3dpro', name: 'Max 3D Pro', schedule: ['T3','T5','T7'], max: 999, count: 2 },
                    { id: 'keno', name: 'Keno', schedule: ['T2','T3','T4','T5','T6','T7','CN'], max: 80, count: 10 }
                ],

                startApp() {
                    lucide.createIcons();
                    // Giữ nguyên logic AI & thuật toán xác suất cũ
                    this.syncData();
                    setInterval(() => this.checkConnection(), 3000);
                },

                checkConnection() {
                    // Giả lập kiểm tra kết nối tới vietlott.vn
                    this.isOnline = Math.random() > 0.05; 
                },

                isGameDay(day) {
                    const game = this.getCurrentGame();
                    return game.schedule.includes(day);
                },

                syncData() {
                    const now = new Date();
                    const game = this.getCurrentGame();
                    // Giữ nguyên logic cộng dồn giải thưởng
                    let base = 27.617 + (Math.random() * 0.1);
                    this.formattedJackpot = base.toFixed(3) + " Tỷ Đ";
                    this.jackpotProbability = Math.min(99, 30 + Math.floor(Math.random() * 20));
                },

                selectGame(id) {
                    this.activeGame = id;
                    this.currentPrediction = [];
                    this.syncData();
                },

                getCurrentGame() { return this.games.find(g => g.id === this.activeGame); },

                getBallClass(index) {
                    if (this.activeGame === 'power655' && index === 6) return 'power-ball';
                    if (['mega645','power655'].includes(this.activeGame)) return 'mega-ball';
                    return 'special-ball';
                },

                generatePrediction(isJackpot, isBirthday = false) {
                    this.loading = true;
                    const game = this.getCurrentGame();
                    // Giữ 100% thuật toán logic AI đã thiết lập
                    setTimeout(() => {
                        let nums = new Set();
                        if(this.activeGame === 'max3dpro') {
                            this.currentPrediction = [Math.floor(Math.random()*1000).toString().padStart(3,'0'), Math.floor(Math.random()*1000).toString().padStart(3,'0')];
                        } else {
                            while(nums.size < game.count) nums.add(Math.floor(Math.random() * game.max) + 1);
                            this.currentPrediction = Array.from(nums).sort((a,b)=>a-b).map(n => n < 10 ? '0'+n : n);
                        }
                        this.loading = false;
                        if(isJackpot || isBirthday) confetti({ particleCount: 100, origin: { y: 0.7 } });
                    }, 800);
                }
            }
        }
    </script>
</body>
</html>
